name: Build & Deploy Portfolio

# Optimizes the raw Claude-design export (index.html) into a fast, static,
# crawlable site and publishes it to GitHub Pages.
#
# Workflow for the owner: edit in Claude design → export → replace index.html →
# commit & push to main. This Action does the rest automatically.
#
# ONE-TIME SETUP: Settings → Pages → Build and deployment → Source → "GitHub Actions".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    # Deploy only on pushes to main / manual runs — PRs just validate the build.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # First attempt. If another deployment is mid-flight (rapid successive
      # pushes), the Pages API rejects this one — so we don't fail the job yet.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # Wait for the in-progress deployment to finish, then retry once.
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "Deploy attempt 1 failed (likely a concurrent deployment). Waiting 90s before retry…"
          sleep 90

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
